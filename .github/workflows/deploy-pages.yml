name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create firebase-config.js from FIREBASEAPI secret
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASEAPI }}
        run: |
          if [ -z "$FIREBASE_API_KEY" ]; then
            echo "::error::FIREBASEAPI secret not set. Add it in Settings → Secrets and variables → Actions"
            exit 1
          fi
          sed "s|__FIREBASE_API_KEY__|$FIREBASE_API_KEY|g" js/firebase-config.template.js > js/firebase-config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
