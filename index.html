<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://firebaseinstallations.googleapis.com wss://*.firebaseio.com; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>VT Shared Governance Tracker - Login</title>
  <link rel="stylesheet" href="css/styles.css?v=20260315">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-brand">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/60/Virginia_Tech_Hokies_logo.svg" alt="VT Logo" class="vt-logo">
        <h1>VT Shared Governance Tracker</h1>
      </div>
    </header>
    <p class="disclaimer-banner" role="note">This is an unofficial student project, not an official Virginia Tech website. Use only if you have been granted access by the project maintainers.</p>

    <main class="login-page">
      <div class="card login-card reveal">
        <h2 class="card-title">Sign In</h2>
        <p class="empty-state" style="padding: 0 0 1rem 0; margin: 0;">
          Enter your PID (or PID@vt.edu) and password to access your committees and meetings.
        </p>
        <div id="loginError" class="login-error" role="alert"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="pid">PID</label>
            <input type="text" id="pid" name="pid" required autocomplete="username" placeholder="PID or PID@vt.edu">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js?v=20260322"></script>
  <script src="js/firebase-auth.js?v=20260322"></script>
  <script src="js/firebase-submissions.js?v=20260322"></script>
  <script src="js/utils.js?v=20260228"></script>
  <script src="js/auth.js?v=20260228"></script>
  <script>
    (async function() {
      var session = getSession();
      if (session && session.pid && session.role) {
        if (session.role === 'admin') {
          window.location.href = getBasePath() + '/admin.html';
        } else {
          window.location.href = getBasePath() + '/dashboard.html';
        }
        return;
      }
      if (typeof firebaseAuthGetSession === 'function' && typeof isFirebaseAuthEnabled === 'function' && isFirebaseAuthEnabled()) {
        session = await firebaseAuthGetSession();
        if (session) {
          createSession(session);
          if (session.role === 'admin') {
            window.location.href = getBasePath() + '/admin.html';
          } else {
            window.location.href = getBasePath() + '/dashboard.html';
          }
          return;
        }
      }

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const pid = document.getElementById('pid').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('loginError');

        errorEl.classList.remove('visible');
        errorEl.textContent = '';

        if (!pid || !password) {
          errorEl.textContent = 'Please enter your PID and password.';
          errorEl.classList.add('visible');
          return;
        }

        try {
          if (typeof firebaseAuthSignIn !== 'function' || !isFirebaseAuthEnabled()) {
            errorEl.textContent = 'Authentication is not configured. Please contact the administrator.';
            errorEl.classList.add('visible');
            return;
          }
          const user = await firebaseAuthSignIn(pid, password);
          createSession(user);
          if (user.role === 'admin') {
            window.location.href = getBasePath() + '/admin.html';
          } else {
            window.location.href = getBasePath() + '/dashboard.html';
          }
        } catch (err) {
          const msg = (err && (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found'))
            ? 'Invalid PID or password. Please try again.'
            : (err && err.message) || 'Unable to sign in. Please try again later.';
          errorEl.textContent = msg;
          errorEl.classList.add('visible');
        }
      });
    })();
  </script>
</body>
</html>
